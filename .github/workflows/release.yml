name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: jf-x86_64-linux.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: jf-aarch64-macos.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: jf-x86_64-macos.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: jf-x86_64-windows.zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar -czvf ${{ matrix.artifact }} -C target/${{ matrix.target }}/release jf

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: cd target/${{ matrix.target }}/release && Compress-Archive jf.exe ../../../${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
