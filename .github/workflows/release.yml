name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, x86_64-apple-darwin, aarch64-apple-darwin, x86_64-pc-windows-msvc

      - name: Build Linux (x86_64)
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu
          tar -czvf jf-x86_64-linux.tar.gz -C target/x86_64-unknown-linux-gnu/release jf

      - name: Build macOS (x86_64)
        run: |
          cargo build --release --target x86_64-apple-darwin
          tar -czvf jf-x86_64-macos.tar.gz -C target/x86_64-apple-darwin/release jf

      - name: Build macOS (ARM64)
        run: |
          cargo build --release --target aarch64-apple-darwin
          tar -czvf jf-aarch64-macos.tar.gz -C target/aarch64-apple-darwin/release jf

      - name: Build Windows (x86_64)
        run: |
          cargo build --release --target x86_64-pc-windows-msvc
          cd target/x86_64-pc-windows-msvc/release && zip ../../../jf-x86_64-windows.zip jf.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jf-x86_64-linux.tar.gz
            jf-x86_64-macos.tar.gz
            jf-aarch64-macos.tar.gz
            jf-x86_64-windows.zip
          generate_release_notes: true
